services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: titanaprilian/personal-portfolio:latest
    container_name: portfolio-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www
      - ./docker/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf
    environment:
      - APP_ENV=local
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=laravel_portfolio
      - DB_USERNAME=root
      - DB_PASSWORD=root
    depends_on:
      - db
    networks:
      - portfolio-network

  db:
    image: mysql:8.0
    container_name: portfolio-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel_portfolio
      MYSQL_USER: laravel
      MYSQL_PASSWORD: laravel
    command:
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - portfolio-network

volumes:
  db-data:

networks:
  portfolio-network:
    driver: bridge
